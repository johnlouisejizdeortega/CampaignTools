# One-command deployment of the Google Ads Team Dashboard.
#
#   1. Put your configured google_ads_php.ini next to this file.
#   2. Set TEAM_ACCESS_PASSWORD below (or in a .env file beside this one).
#   3. Run:  docker compose up -d --build
#   4. Open: http://localhost:8080
services:
  dashboard:
    build: .
    ports:
      - "8080:80"
    environment:
      # The shared password your team uses to sign in. Change this!
      TEAM_ACCESS_PASSWORD: "${TEAM_ACCESS_PASSWORD:-change-me-please}"
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      # Your Google Ads credentials, mounted read-only (never baked into the image).
      - ./google_ads_php.ini:/var/www/html/google_ads_php.ini:ro
    restart: unless-stopped
