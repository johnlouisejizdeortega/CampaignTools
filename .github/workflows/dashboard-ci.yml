# Continuous integration for the Laravel Sample App (Google Ads Team Dashboard).
name: Dashboard CI

on:
  push:
    paths:
      - 'examples/LaravelSampleApp/**'
      - '.github/workflows/dashboard-ci.yml'
  pull_request:
    paths:
      - 'examples/LaravelSampleApp/**'
      - '.github/workflows/dashboard-ci.yml'

defaults:
  run:
    working-directory: examples/LaravelSampleApp

jobs:
  backend:
    name: PHP tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, mbstring, intl
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run the test suite
        run: vendor/bin/phpunit

  frontend:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: examples/LaravelSampleApp/package-lock.json
      - name: Install npm dependencies
        run: npm ci
      - name: Component tests (Vitest)
        run: npm run test
      - name: Production build
        run: npm run build
